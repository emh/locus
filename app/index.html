<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#fffff8">
  <meta name="application-name" content="Locus">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Locus">
  <title>Locus</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="660x660" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./styles.css">
  <script src="./version.js"></script>
  <script src="./config.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./main.js"></script>
</head>
<body>
  <div id="map-container">
    <div id="map"></div>
  </div>

  <div id="scroll-area">
    <main id="places">
      <header>
        <h1>locus</h1>
        <p id="stats"></p>
      </header>

      <div class="input-wrap">
        <div class="input-field">
          <input type="text" id="main-input" placeholder="paste a url or search places..." autocomplete="off" spellcheck="false">
          <div class="input-progress" id="input-progress"></div>
        </div>
        <div id="input-status"></div>
      </div>

      <nav class="filter-row" id="type-filters" aria-label="Place types"></nav>
      <nav class="filter-row" id="city-filters" aria-label="Cities"></nav>
      <button class="sort-control" id="sort-btn" type="button"></button>
      <div id="place-list"></div>
      <div class="empty-state" id="empty-state">No places found.</div>
    </main>
  </div>

  <div class="overlay" id="detail-overlay">
    <div class="overlay-content" id="detail-content"></div>
  </div>

  <div class="toast" id="toast"></div>
  <script async data-id="101502386" src="//static.getclicky.com/js"></script>
</body>
</html>
